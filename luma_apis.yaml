  /v1/vector/{collection}/diskann/build:
    post:
      description: >
        Triggers a full Vamana graph build for the collection. The build runs
        synchronously and may take seconds to minutes depending on collection
        size and `build_threads`. Once complete the index is immediately active
        for approximate search queries.


        All body fields are optional — omitted values fall back to the server's
        `diskann_*` configuration defaults.
      parameters:
        - in: path
          name: collection
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            example:
              build_threads: 4
              max_degree: 32
              search_list_size: 128
            schema:
              $ref: "#/components/schemas/DiskAnnBuildRequest"
        required: false
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiskAnnMutationResponse"
          description: Index built successfully
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Collection not found
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Build failed
      security:
        - bearerAuth: []
      summary: Build DiskANN index
      tags:
        - Vector Operations
  /v1/vector/{collection}/diskann/status:
    get:
      description: >
        Returns whether a DiskANN graph is built and loaded for this collection,
        its build timestamp, the list of graph segment files, and the effective
        build parameters.
      parameters:
        - in: path
          name: collection
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiskAnnStatusResponse"
          description: Status retrieved
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Collection not found
      security:
        - bearerAuth: []
      summary: Get DiskANN index status
      tags:
        - Vector Operations
  /v1/vector/{collection}/diskann/tune:
    post:
      description: >
        Updates DiskANN search parameters (`search_list_size`, `max_degree`)
        without rebuilding the graph from scratch. Useful to adjust
        recall/latency tradeoffs on an already-built index. A full rebuild is
        not triggered.
      parameters:
        - in: path
          name: collection
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            example:
              search_list_size: 200
            schema:
              $ref: "#/components/schemas/DiskAnnBuildRequest"
        required: false
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiskAnnMutationResponse"
          description: Parameters applied
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Collection not found
      security:
        - bearerAuth: []
      summary: Tune DiskANN search parameters
      tags:
        - Vector Operations
  /v1/vector/{collection}/get:
    get:
      parameters:
        - in: path
          name: collection
          required: true
          schema:
            type: string
        - in: query
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VectorGetResponse"
          description: Found
        "404":
          description: Not found
      security:
        - bearerAuth: []
      summary: Get vector by ID
      tags:
        - Vector Operations
  /v1/vector/{collection}/rerank:
    post:
      description: >
        Retrieves the stored vectors for the given IDs and re-scores them
        against the query (text or pre-computed vector) using cosine similarity.
        Returns the same IDs sorted by score descending. Useful as a
        second-stage ranker after an ANN search.
      parameters:
        - in: path
          name: collection
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RerankRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RerankResponse"
          description: IDs sorted by cosine similarity descending
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Invalid request (e.g. both query_text and query_vector provided)
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Collection not found
      security:
        - bearerAuth: []
      summary: Rerank vectors by cosine similarity
      tags:
        - Vector Operations
  /v1/vector/{collection}/scroll:
    get:
      description: >
        Iterates over all vectors in a collection using an opaque lexicographic
        cursor. Use `next_cursor` from the previous response as the `cursor`
        parameter of the next request. Returns an empty `items` array and
        `next_cursor: null` when the collection is exhausted. Suitable for full
        collection exports.
      parameters:
        - in: path
          name: collection
          required: true
          schema:
            type: string
        - description: Opaque cursor from a previous response. Omit to start from the
            beginning.
          in: query
          name: cursor
          required: false
          schema:
            type: string
        - description: Number of items per page.
          in: query
          name: limit
          required: false
          schema:
            default: 100
            maximum: 1000
            minimum: 1
            type: integer
        - description: Include the raw vector data in each item.
          in: query
          name: include_vectors
          required: false
          schema:
            default: false
            type: boolean
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScrollResponse"
          description: Page of items with optional next cursor
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Collection not found
      security:
        - bearerAuth: []
      summary: Scroll / cursor-based pagination
      tags:
        - Vector Operations
  /v1/vector/{collection}/search:
    post:
      parameters:
        - in: path
          name: collection
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VectorSearchRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VectorSearchResponse"
          description: Search results
      security:
        - bearerAuth: []
      summary: Low-level Vector Search (KNN)
      tags:
        - Vector Operations
  /v1/vector/{collection}/search_batch:
    post:
      description: >
        Executes up to 100 `SearchRequest` objects in parallel using
        `rayon::par_iter()`. Returns one result array per query in the same
        order as the input. Useful for RAG pipelines that fan out many queries
        in a single round-trip.
      parameters:
        - in: path
          name: collection
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VectorSearchBatchRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VectorSearchBatchResponse"
          description: One result set per query
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Invalid request (e.g. more than 100 queries)
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Collection not found
      security:
        - bearerAuth: []
      summary: Batch vector search (up to 100 queries in parallel)
      tags:
        - Vector Operations
  /v1/vector/{collection}/update:
    post:
      description: Update vector or metadata for an existing ID. Fails if ID not found.
      parameters:
        - in: path
          name: collection
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VectorUpdateRequest"
        required: true
      responses:
        "200":
          description: Updated
        "404":
          description: ID not found
      security:
        - bearerAuth: []
      summary: Partial Update
      tags:
        - Vector Operations
  /v1/vector/{collection}/upsert:
    post:
      parameters:
        - in: path
          name: collection
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VectorAddRequest"
        required: true
      responses:
        "200":
          description: Upserted
      security:
        - bearerAuth: []
      summary: Upsert vector (Insert or Update)
      tags:
        - Vector Operations
  /v1/vector/{collection}/upsert_batch:
    post:
      parameters:
        - in: path
          name: collection
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                items:
                  items:
                    $ref: "#/components/schemas/VectorBatchItem"
                  type: array
              type: object
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VectorBatchResponse"
          description: Batch results
      security:
        - bearerAuth: []
      summary: Batch Upsert
      tags:
        - Vector Operations
servers:
  - description: Current Server
    url: http://luma.deepgen.qzz.io
tags:
  - description: High-level semantic search API (Text-to-Vector abstraction)
    name: RAG Search
  - description: Core vector database operations (Collections, Upsert, Search)
    name: Vector Operations
  - description: Distributed Key-Value store with CAS (Compare-And-Swap) support
    name: State Management
  - description: Real-time event subscription (SSE)
    name: Streaming
  - description: Storage for raw documents and metadata
    name: Document Store
  - description: SQLite bridge for relational data
    name: SQL
  - description: Health checks and metrics
    name: System
  - description: Meta Engine integrated operations
    name: Meta
  - description: High-level unified orchestrator (Nivel 2) for complex RAG flows,
      chunking, and multi-engine coordination.
    name: LumaDatabase
  - description: Memory layer for episodic, semantic, procedural and working-memory flows.
    name: NS-Mem
  - description: Backup, audit log and operational endpoints. Require admin role.
    name: Admin
  - description: API key management — create, list and revoke keys. Require admin role.
    name: Access Control
