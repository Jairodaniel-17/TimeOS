                  type: array
              type: object
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StateBatchResponse"
          description: Batch result
      security:
        - bearerAuth: []
      summary: Batch put keys
      tags:
        - State Management
  /v1/state/index/{field}/{value}:
    get:
      description: >
        Returns all state items whose `value.{field}` equals `{value}`. Requires
        a prior call to `POST /v1/state/indexes` for this field. Results are
        unordered. Use `limit` to cap the result set (max 1000).
      parameters:
        - description: The JSON field name that was indexed.
          example: user_id
          in: path
          name: field
          required: true
          schema:
            type: string
        - description: The exact value to match.
          example: "42"
          in: path
          name: value
          required: true
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            default: 100
            maximum: 1000
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/StateItem"
                type: array
          description: Matching state items
        "401":
          description: Unauthorized
      security:
        - bearerAuth: []
      summary: Query state by secondary index
      tags:
        - State Management
  /v1/state/indexes:
    post:
      description: >
        Registers a secondary in-memory index on a JSON field inside state
        values. Once created, `GET /v1/state/index/{field}/{value}` performs
        O(1) lookups instead of a full key scan. Indexes survive as long as the
        server is running but are not persisted to disk — recreate them after a
        restart.


        Creating an index on an already-indexed field is a no-op.
      requestBody:
        content:
          application/json:
            example:
              field: user_id
            schema:
              $ref: "#/components/schemas/CreateStateIndexRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateStateIndexResponse"
          description: Index created (or already existed)
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Invalid field name
        "401":
          description: Unauthorized
      security:
        - bearerAuth: []
      summary: Create a secondary index on a state field
      tags:
        - State Management
  /v1/state/{key}:
    delete:
      parameters:
        - in: path
          name: key
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteStateResponse"
          description: Deleted
      security:
        - bearerAuth: []
      summary: Delete key
      tags:
        - State Management
    get:
      parameters:
        - in: path
          name: key
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StateItem"
          description: Found
        "404":
          description: Key not found
      security:
        - bearerAuth: []
      summary: Get key value
      tags:
        - State Management
    put:
      description: Supports Optimistic Locking via `if_revision`.
      parameters:
        - in: path
          name: key
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PutStateRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutStateResponse"
          description: Updated successfully
        "409":
          description: Revision mismatch (CAS failed)
      security:
        - bearerAuth: []
      summary: Set key value
      tags:
        - State Management
  /v1/stream:
    get:
      description: >
        Subscribe to database events (upserts, state changes) via Server-Sent
        Events.

        Supports filtering by type, key prefix, and collection.
      parameters:
        - description: Offset/event_id to replay from. Default 0.
          in: query
          name: since
          schema:
            default: 0
            format: uint64
            type: integer
        - description: Comma-separated event types (e.g., `vector_upserted,state_changed`).
          in: query
          name: types
          schema:
            type: string
        - description: Filter events by key prefix.
          in: query
          name: key_prefix
          schema:
            type: string
        - description: Filter events by collection name.
          in: query
          name: collection
          schema:
            type: string
        - in: header
          name: Last-Event-ID
          required: false
          schema:
            type: string
      responses:
        "200":
          content:
            text/event-stream:
              schema:
                type: string
          description: Stream of events
        "401":
          description: Unauthorized
      security:
        - bearerAuth: []
      summary: Real-time Event Stream (SSE)
      tags:
        - Streaming
