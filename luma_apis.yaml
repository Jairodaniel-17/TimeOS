  /v1/vector/{collection}/aggregate:
    post:
      description: >
        Groups vectors by a metadata field and returns bucket counts. Uses the
        keyword index fast path (O(1) per bucket) when the field is indexed.
        Falls back to a full scan with `evaluate_filter` for complex filter
        expressions. Supports the same typed `MetadataFilter` as search.
      parameters:
        - in: path
          name: collection
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            example:
              filter:
                field: status
                op: eq
                value: active
              group_by: tax_system
              limit: 20
            schema:
              $ref: "#/components/schemas/AggregateRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AggregateResponse"
          description: Buckets sorted by count descending
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Collection not found
      security:
        - bearerAuth: []
      summary: Aggregate / group-by on metadata fields
